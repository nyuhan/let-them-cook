<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - Let Them Cook</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-800 font-sans min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 w-full max-w-sm">
    <div class="flex items-center mb-6">
      <img src="/static/logo.png" alt="Logo" class="h-10 w-auto mr-3">
      <h1 class="text-xl font-bold text-gray-900">Let Them Cook</h1>
    </div>

    {% with messages = get_flashed_messages(category_filter=['error']) %}
    {% if messages %}
    <div class="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 mb-4 text-sm">
      {{ messages[0] }}
    </div>
    {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1" for="password">Password</label>
        <input type="password" id="password" name="password" required autofocus
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
      </div>

      {% if totp_enabled %}
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1" for="totp_code">Authenticator Code</label>
        <input type="text" id="totp_code" name="totp_code" inputmode="numeric" pattern="[0-9]*"
          autocomplete="one-time-code" maxlength="6"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
          placeholder="6-digit code">
      </div>
      {% endif %}

      <div class="mb-6 flex items-center">
        <input type="checkbox" id="remember" name="remember"
          class="h-4 w-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500">
        <label for="remember" class="ml-2 text-sm text-gray-700">Remember me</label>
      </div>

      <button type="submit"
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-4 rounded-lg text-sm transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
        Sign in
      </button>
    </form>
  </div>
</body>

</html>
