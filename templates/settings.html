<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Settings – Let Them Cook</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-800 font-sans">
  <header class="bg-white shadow-sm">
    <div class="max-w-6xl mx-auto py-4 px-4 sm:px-6 lg:px-8 flex items-center justify-between">
      <div class="flex items-center">
        <img src="/static/logo.png" alt="Logo" class="h-10 w-auto mr-3">
        <h1 class="text-xl font-bold text-gray-900">Let Them Cook</h1>
      </div>
    </div>
  </header>

  <main class="max-w-lg mx-auto p-4 sm:p-6 lg:p-8 space-y-6">
    <h2 class="text-2xl font-bold text-gray-900 mt-2">Settings</h2>

    <!-- Change Password -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
      <h3 class="text-lg font-semibold text-gray-800 mb-4">Change Password</h3>

      {% if error %}
      <div class="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 mb-4 text-sm">{{ error }}</div>
      {% endif %}

      {% if success %}
      <div class="bg-green-50 border border-green-200 text-green-700 rounded-lg px-4 py-3 mb-4 text-sm">{{ success }}
      </div>
      {% endif %}

      <form method="POST" action="{{ url_for('settings') }}" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1" for="current_password">Current Password</label>
          <input type="password" id="current_password" name="current_password" required
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1" for="new_password">New Password</label>
          <input type="password" id="new_password" name="new_password" required minlength="8"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1" for="confirm_password">Confirm New
            Password</label>
          <input type="password" id="confirm_password" name="confirm_password" required minlength="8"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
        <button type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-4 rounded-lg text-sm transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
          Update Password
        </button>
      </form>
    </div>

    <!-- Two-Factor Authentication -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
      <h3 class="text-lg font-semibold text-gray-800 mb-1">Two-Factor Authentication</h3>

      {% if totp_enabled %}
      <p class="text-sm text-green-700 mb-4 flex items-center gap-2">
        <span class="inline-block w-2 h-2 rounded-full bg-green-500"></span> Enabled
      </p>
      <div class="flex gap-3">
        <a href="{{ url_for('setup_2fa') }}"
          class="text-sm font-medium text-indigo-600 border border-indigo-200 rounded-lg px-4 py-2 hover:bg-indigo-50 transition-colors">
          Regenerate QR Code
        </a>
        <form method="POST" action="{{ url_for('disable_2fa') }}">
          <button type="submit"
            class="text-sm font-medium text-red-600 border border-red-200 rounded-lg px-4 py-2 hover:bg-red-50 transition-colors">
            Disable 2FA
          </button>
        </form>
      </div>
      {% else %}
      <p class="text-sm text-gray-500 mb-4 flex items-center gap-2">
        <span class="inline-block w-2 h-2 rounded-full bg-gray-300"></span> Not enabled
      </p>
      <a href="{{ url_for('setup_2fa') }}"
        class="inline-block text-sm font-semibold text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg px-4 py-2 transition-colors">
        Setup 2FA
      </a>
      {% endif %}
    </div>

    <div class="flex items-center justify-between">
      <a href="{{ url_for('index') }}"
        class="inline-flex items-center gap-2 text-sm font-medium text-gray-600 bg-white border border-gray-200 rounded-lg px-4 py-2 hover:bg-gray-50 shadow-sm transition-colors">
        ← Back
      </a>
      <a href="{{ url_for('logout') }}" class="text-sm text-gray-500 hover:text-gray-700">Logout</a>
    </div>
  </main>
</body>

</html>
