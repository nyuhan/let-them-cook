<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Let Them Cook</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}?v=workinghours">
    <style>
      /* Simple transition for modal */
      #restaurant-modal.hidden { display: none; }
    </style>
  </head>
  <body class="bg-gray-100 text-gray-800 font-sans">
    <header class="bg-white shadow-sm">
      <div class="max-w-5xl mx-auto py-4 px-4 sm:px-6 lg:px-8 flex items-center">
        <img src="/static/logo.png" alt="Logo" class="h-14 w-auto mr-4">
        <h1 class="text-3xl font-bold text-gray-900">Let Them Cook</h1>
      </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 sm:p-6 lg:p-8">
      <div class="flex flex-col sm:flex-row items-center justify-between mb-8 gap-4">
        <div>
           <!-- <h2 class="text-3xl font-bold text-gray-900 tracking-tight">Let Them Cook</h2> -->
           <p class="text-gray-500 mt-1">Record and manage your favorite dining spots.</p>
        </div>
        <div class="flex items-center gap-4">
          <button id="add-restaurant-btn" class="inline-flex items-center justify-center py-2.5 px-5 border border-transparent shadow-md text-sm font-semibold rounded-full text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all hover:scale-105">
            + Add Restaurant
          </button>
        </div>
      </div>
      
      <!-- Modern Filter Bar -->
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 mb-8">
        <div class="space-y-4">
          <!-- Search -->
          <div class="relative group">
              <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                  <svg class="h-5 w-5 text-gray-400 group-focus-within:text-indigo-500 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                  </svg>
              </div>
              <input id="search-input" type="search" placeholder="Search by restaurant name..." class="pl-11 block w-full bg-gray-50 border-transparent focus:bg-white focus:border-indigo-500 focus:ring-0 rounded-xl py-3 text-gray-900 placeholder-gray-400 transition-all hover:bg-gray-100" />
          </div>

          <div class="flex flex-col lg:flex-row gap-6 justify-between lg:items-center border-t border-gray-100 pt-4">
              <div class="flex flex-wrap gap-3 w-full">
                  <!-- Type Filter Dropdown -->
                  <div class="relative inline-block text-left filter-dropdown">
                    <button type="button" class="dropdown-trigger inline-flex justify-between items-center w-full rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-sm font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500" data-default="Type">
                      Type
                      <svg class="-mr-1 ml-2 h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                        <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" />
                      </svg>
                    </button>
                    <div class="dropdown-menu hidden origin-top-right absolute left-0 mt-2 w-40 rounded-md shadow-lg bg-white ring-1 ring-black ring-opacity-5 focus:outline-none z-10">
                      <div class="py-1" role="none" id="type-filter-options">
                        <button class="block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100" data-value="" data-label="Type">Any</button>
                        <button class="block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100" data-value="dine-in" data-label="Type: Dine-in">Dine-in</button>
                        <button class="block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100" data-value="delivery" data-label="Type: Delivery">Delivery</button>
                        <button class="block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100" data-value="both" data-label="Type: Both">Both</button>
                      </div>
                    </div>
                    <input type="hidden" id="filter-type" value="">
                  </div>

                  <!-- Open Status Filter Dropdown -->
                  <div class="relative inline-block text-left filter-dropdown">
                    <button type="button" class="dropdown-trigger inline-flex justify-between items-center w-full rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-sm font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500" data-default="Status">
                      Status
                      <svg class="-mr-1 ml-2 h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                        <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" />
                      </svg>
                    </button>
                    <div class="dropdown-menu hidden origin-top-right absolute left-0 mt-2 w-40 rounded-md shadow-lg bg-white ring-1 ring-black ring-opacity-5 focus:outline-none z-10">
                      <div class="py-1" role="none" id="status-filter-options">
                        <button class="block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100" data-value="" data-label="Status">Any</button>
                        <button class="block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100" data-value="open" data-label="Status: Open">Open</button>
                        <button class="block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100" data-value="closed" data-label="Status: Closed">Closed</button>
                      </div>
                    </div>
                    <input type="hidden" id="filter-status" value="any">
                  </div>

                  <!-- City Filter Dropdown -->
                  <div class="relative inline-block text-left filter-dropdown">
                    <button type="button" class="dropdown-trigger inline-flex justify-between items-center w-full rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-sm font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500" data-default="City">
                      City
                      <svg class="-mr-1 ml-2 h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                        <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" />
                      </svg>
                    </button>
                    <div class="dropdown-menu hidden origin-top-right absolute left-0 mt-2 w-56 rounded-md shadow-lg bg-white ring-1 ring-black ring-opacity-5 focus:outline-none z-10 max-h-60 overflow-y-auto">
                      <div class="py-1" role="none" id="city-filter-options">
                        <button class="block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100" data-value="" data-label="City">Any</button>
                        <!-- Cities injected here -->
                      </div>
                    </div>
                    <input type="hidden" id="filter-city" value="">
                  </div>

                   <!-- Rating Filter Dropdown -->
                  <div class="relative inline-block text-left filter-dropdown">
                    <button type="button" class="dropdown-trigger inline-flex justify-between items-center w-full rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-sm font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500" data-default="Min Rating">
                      Min Rating
                      <svg class="-mr-1 ml-2 h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                        <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" />
                      </svg>
                    </button>
                     <div class="dropdown-menu hidden origin-top-right absolute left-0 mt-2 w-40 rounded-md shadow-lg bg-white ring-1 ring-black ring-opacity-5 focus:outline-none z-10">
                      <div class="py-1" role="none" id="rating-filter-options">
                        <button class="block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100" data-value="0" data-label="Min Rating">Any</button>
                        <button class="block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100" data-value="5" data-label="Min Rating: 5★">5★</button>
                        <button class="block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100" data-value="4" data-label="Min Rating: 4★">4★</button>
                        <button class="block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100" data-value="3" data-label="Min Rating: 3★">3★</button>
                      </div>
                    </div>
                     <input type="hidden" id="filter-rating" value="0">
                  </div>

                   <!-- Price Filter Dropdown -->
                  <div class="relative inline-block text-left filter-dropdown">
                    <button type="button" class="dropdown-trigger inline-flex justify-between items-center w-full rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-sm font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500" data-default="Max Price">
                      Max Price
                      <svg class="-mr-1 ml-2 h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                        <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" />
                      </svg>
                    </button>
                    <div class="dropdown-menu hidden origin-top-right absolute left-0 mt-2 w-40 rounded-md shadow-lg bg-white ring-1 ring-black ring-opacity-5 focus:outline-none z-10">
                      <div class="py-1" role="none" id="price-filter-options">
                        <button class="block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100" data-value="" data-label="Max Price">Any</button>
                        <button class="block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100" data-value="1" data-label="Max Price: $">$</button>
                        <button class="block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100" data-value="2" data-label="Max Price: $$">$$</button>
                        <button class="block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100" data-value="3" data-label="Max Price: $$$">$$$</button>
                        <button class="block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100" data-value="4" data-label="Max Price: $$$$">$$$$</button>
                      </div>
                    </div>
                     <input type="hidden" id="filter-price" value="">
                  </div>

                  <!-- Clear Filters Button -->
                  <div class="ml-auto">
                      <button id="top-clear-filters-btn" type="button" class="inline-flex items-center px-4 py-2 border border-transparent shadow-sm text-sm font-medium rounded-md text-indigo-700 bg-indigo-100 hover:bg-indigo-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                          Clear Filters
                      </button>
                  </div>
              </div>
          </div>
        </div>
      </div>

      <div id="list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 items-start">
        <!-- cards will be injected here -->
      </div>
    </main>

    <!-- Modal -->
    <div id="restaurant-modal" class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full hidden z-10">
      <div class="relative top-20 mx-auto p-5 border w-full max-w-md shadow-lg rounded-md bg-white">
        <div class="flex justify-between items-center border-b pb-3 mb-5">
          <h2 id="modal-title" class="text-xl font-semibold">Add Restaurant</h2>
          <div class="flex items-center space-x-4">
             <button id="refresh-restaurant-btn" class="hidden text-gray-400 hover:text-indigo-600 transition-colors" title="Refresh metadata from Google Maps">
                <!-- Refresh Icon -->
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                </svg>
             </button>
             <button id="close-modal-btn" class="text-gray-500 hover:text-gray-800 text-3xl font-light leading-none">&times;</button>
          </div>
        </div>
        <form id="restaurant-form" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700">Restaurant Name</label>
            <!-- In edit mode, we show the name as text. In add mode, we show the autocomplete search. -->
            <div id="edit-name-display" class="hidden text-lg font-semibold text-gray-900 py-2 px-1"></div>
            <gmp-place-autocomplete id="place-autocomplete" placeholder="Start typing a restaurant name"></gmp-place-autocomplete>
            <input type="hidden" id="place-id" />
            <div id="opening-hours-container" class="hidden mt-3">
                <label class="block text-sm font-medium text-gray-700 mb-2">Working Hours</label>
                <div id="opening-hours-list" class="text-xs text-gray-500 space-y-1"></div>
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Type</label>
            <div id="type-buttons" role="group" class="flex space-x-1 rounded-lg p-1 bg-gray-200">
                <button type="button" data-value="dine-in" class="type-button flex-1 rounded-md py-2 text-sm font-medium text-gray-700 bg-white shadow-sm ring-1 ring-inset ring-gray-300">Dine-in</button>
                <button type="button" data-value="delivery" class="type-button flex-1 rounded-md py-2 text-sm font-medium text-gray-700 hover:bg-gray-50">Delivery</button>
                <button type="button" data-value="both" class="type-button flex-1 rounded-md py-2 text-sm font-medium text-gray-700 hover:bg-gray-50">Both</button>
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">Rating</label>
            <div id="rating-stars" class="mt-1 flex items-center cursor-pointer" data-rating="5">
                <svg class="w-6 h-6 text-yellow-400" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.262 3.89a1 1 0 00.95.69h4.1c.969 0 1.371 1.24.588 1.81l-3.32 2.41a1 1 0 00-.364 1.118l1.262 3.89c.3.921-.755 1.688-1.54 1.118l-3.32-2.41a1 1 0 00-1.176 0l-3.32 2.41c-.785.57-1.84-.197-1.54-1.118l1.262-3.89a1 1 0 00-.364-1.118L2.15 9.317c-.783-.57-.38-1.81.588-1.81h4.1a1 1 0 00.95-.69l1.262-3.89z"/></svg>
                <svg class="w-6 h-6 text-yellow-400" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.262 3.89a1 1 0 00.95.69h4.1c.969 0 1.371 1.24.588 1.81l-3.32 2.41a1 1 0 00-.364 1.118l1.262 3.89c.3.921-.755 1.688-1.54 1.118l-3.32-2.41a1 1 0 00-1.176 0l-3.32 2.41c-.785.57-1.84-.197-1.54-1.118l1.262-3.89a1 1 0 00-.364-1.118L2.15 9.317c-.783-.57-.38-1.81.588-1.81h4.1a1 1 0 00.95-.69l1.262-3.89z"/></svg>
                <svg class="w-6 h-6 text-yellow-400" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.262 3.89a1 1 0 00.95.69h4.1c.969 0 1.371 1.24.588 1.81l-3.32 2.41a1 1 0 00-.364 1.118l1.262 3.89c.3.921-.755 1.688-1.54 1.118l-3.32-2.41a1 1 0 00-1.176 0l-3.32 2.41c-.785.57-1.84-.197-1.54-1.118l1.262-3.89a1 1 0 00-.364-1.118L2.15 9.317c-.783-.57-.38-1.81.588-1.81h4.1a1 1 0 00.95-.69l1.262-3.89z"/></svg>
                <svg class="w-6 h-6 text-yellow-400" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.262 3.89a1 1 0 00.95.69h4.1c.969 0 1.371 1.24.588 1.81l-3.32 2.41a1 1 0 00-.364 1.118l1.262 3.89c.3.921-.755 1.688-1.54 1.118l-3.32-2.41a1 1 0 00-1.176 0l-3.32 2.41c-.785.57-1.84-.197-1.54-1.118l1.262-3.89a1 1 0 00-.364-1.118L2.15 9.317c-.783-.57-.38-1.81.588-1.81h4.1a1 1 0 00.95-.69l1.262-3.89z"/></svg>
                <svg class="w-6 h-6 text-yellow-400" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.262 3.89a1 1 0 00.95.69h4.1c.969 0 1.371 1.24.588 1.81l-3.32 2.41a1 1 0 00-.364 1.118l1.262 3.89c.3.921-.755 1.688-1.54 1.118l-3.32-2.41a1 1 0 00-1.176 0l-3.32 2.41c-.785.57-1.84-.197-1.54-1.118l1.262-3.89a1 1 0 00-.364-1.118L2.15 9.317c-.783-.57-.38-1.81.588-1.81h4.1a1 1 0 00.95-.69l1.262-3.89z"/></svg>
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">Notes</label>
            <textarea id="restaurant-notes" rows="3" class="mt-1 shadow-sm focus:ring-indigo-500 focus:border-indigo-500 block w-full sm:text-sm border-gray-300 rounded-md" placeholder="Anything to note about the restaurant?"></textarea>
          </div>
          
          <!-- Dishes Section -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Dishes</label>
            <div id="dishes-container" class="space-y-2 mb-2">
                <!-- Dishes list injected here -->
            </div>
             <button type="button" id="add-dish-btn" class="inline-flex items-center px-3 py-1.5 border border-gray-300 shadow-sm text-xs font-medium rounded text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                + Add Dish
            </button>
             
             <!-- Hidden Add Dish Form (shown when needed, or maybe inline?) -->
             <div id="add-dish-form" class="hidden mt-2 p-3 border border-gray-200 rounded-md bg-gray-50 space-y-3 relative">
                 <div class="space-y-2">
                     <input type="text" id="new-dish-name" placeholder="Dish name" class="block w-full text-sm border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500 shadow-sm">
                     <textarea id="new-dish-notes" rows="2" placeholder="Notes (optional)" class="block w-full text-sm border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500 shadow-sm"></textarea>
                     <div class="flex items-center justify-between">
                        <div class="flex gap-4">
                            <label class="cursor-pointer">
                                <input type="radio" name="new-dish-rating" value="1" checked class="peer sr-only">
                                <div class="p-1.5 rounded-md hover:bg-gray-100 text-gray-400 peer-checked:text-green-700 peer-checked:bg-green-100 transition-all">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                        <path d="M2 10.5a1.5 1.5 0 113 0v6a1.5 1.5 0 01-3 0v-6zM6 10.333v5.43a2 2 0 001.106 1.79l.05.025A4 4 0 008.943 18h5.416a2 2 0 001.962-1.608l1.2-6A2 2 0 0015.56 8H12V4a2 2 0 00-2-2 1 1 0 00-1 1v.667a4 4 0 01-.8 2.4L6.8 7.933a4 4 0 00-.8 2.4z" />
                                    </svg>
                                </div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="new-dish-rating" value="0" class="peer sr-only">
                                <div class="p-1.5 rounded-md hover:bg-gray-100 text-gray-400 peer-checked:text-red-700 peer-checked:bg-red-100 transition-all">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                        <path d="M18 9.5a1.5 1.5 0 11-3 0v-6a1.5 1.5 0 013 0v6zM14 9.667v-5.43a2 2 0 00-1.105-1.79l-.05-.025A4 4 0 0011.055 2H5.64a2 2 0 00-1.962 1.608l-1.2 6A2 2 0 004.44 12H8v4a2 2 0 002 2 1 1 0 001-1v-.667a4 4 0 01.8-2.4l1.4-1.866a4 4 0 00.8-2.4z" />
                                    </svg>
                                </div>
                            </label>
                         </div>
                         <div class="flex gap-2">
                            <button type="button" id="save-dish-btn" class="inline-flex items-center px-2.5 py-1.5 border border-transparent text-xs font-medium rounded text-indigo-700 bg-indigo-100 hover:bg-indigo-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                                Add
                            </button>
                            <button type="button" id="cancel-dish-btn" class="inline-flex items-center px-2.5 py-1.5 border border-gray-300 text-xs font-medium rounded text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                                Cancel
                            </button>
                         </div>
                     </div>
                 </div>
             </div>
          </div>

          <div class="pt-4 flex items-center gap-3">
            <button id="submit-btn" type="submit" class="flex-1 inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700">Add restaurant</button>
          </div>
          <input type="hidden" id="edit-id" />
          <div id="message" class="text-sm text-center pt-2 h-6"></div>
        </form>
      </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-modal" class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full hidden z-20">
      <div class="relative top-40 mx-auto p-5 border w-full max-w-sm shadow-lg rounded-md bg-white">
        <div class="mt-3 text-center">
          <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-100">
            <svg class="h-6 w-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>

          </div>

          <div class="mt-2 px-7 py-3">
            <p class="text-sm text-gray-500">

          </div>

            <button id="cancel-delete-btn" class="mt-3 px-4 py-2 bg-white text-gray-700 text-base font-medium rounded-md w-full shadow-sm border border-gray-300 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-indigo-500">
              Cancel
            </button>
          </div>
        </div>
      </div>
