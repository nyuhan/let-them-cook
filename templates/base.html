<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Let Them Cook{% endblock %}</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
    <link rel="icon" href="/static/favicon.ico">
    <link rel="manifest" href="/static/site.webmanifest">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Let Them Cook">
    <meta name="theme-color" content="#ffffff">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <link rel="stylesheet" href="{{ versioned_url('tailwind.css') }}">
    {% block head %}{% endblock %}
</head>

<body class="bg-gray-100 text-gray-800 font-sans">
    {% block before_header %}{% endblock %}
    <header class="bg-white shadow-sm">
        <div class="max-w-6xl mx-auto py-4 px-4 sm:px-6 lg:px-8 flex items-center justify-between">
            <div class="flex items-center">
                <a href="/" class="flex items-center">
                    <img src="/static/logo.png" alt="Logo" class="h-10 w-auto mr-3">
                    <h1 class="text-xl font-bold text-gray-900">Let Them Cook</h1>
                </a>
            </div>
            {% block header_actions %}{% endblock %}
        </div>
    </header>

    {% block body %}{% endblock %}
</body>

</html>
