name: Build and Push Docker Image

on:
  workflow_run:
    workflows: ["Run Tests"]
    types: [completed]
    branches: [master]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      # 1. Check out the code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Docker Buildx (required for advanced building/caching)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      # 4. Build and Push the image
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/let-them-cook:latest
          # Optional: Add caching to speed up future builds
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/let-them-cook:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/let-them-cook:buildcache,mode=max
